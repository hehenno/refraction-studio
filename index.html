<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Refract">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Refraction Studio</title>
<style>
  :root{
    --bg:#0a0a0a;
    --panel:#141414;
    --line:#1f1f1f;
    --ink:#f4f4f4;
    --mute:#8a8a8a;
    --hot:#ff4d2e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    overflow:hidden;height:100%;height:100dvh;
    overscroll-behavior:none;
  }
  body{
    display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px 18px 10px;display:flex;align-items:baseline;gap:12px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0;font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  }
  header .dot{width:7px;height:7px;border-radius:50%;background:var(--hot);
    display:inline-block;transform:translateY(-1px);}
  header .meta{font-size:10px;color:var(--mute);letter-spacing:.12em;margin-left:auto;text-transform:uppercase;}

  .stage{position:relative;flex:1 1 auto;min-height:0;background:#000;}
  canvas#gl{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  .overlay{
    position:absolute;top:10px;right:10px;display:flex;gap:6px;align-items:center;
    pointer-events:none;z-index:5;
  }
  .overlay #zoomReadout{
    font-size:10px;letter-spacing:.14em;color:var(--mute);
    background:rgba(10,10,10,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    padding:5px 8px;border-radius:999px;border:1px solid var(--line);
    font-variant-numeric:tabular-nums;
    pointer-events:auto;cursor:pointer;user-select:none;
  }
  .overlay #zoomReadout:active{background:rgba(255,77,46,.25);border-color:var(--hot);color:var(--ink);}
  .overlay #centre{
    pointer-events:auto;background:rgba(10,10,10,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--ink);border:1px solid var(--line);border-radius:999px;
    padding:5px 11px;font:inherit;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;cursor:pointer;
  }
  .overlay #centre:active{background:rgba(255,77,46,.25);border-color:var(--hot);}
  .overlay #fullscreen{
    pointer-events:auto;background:rgba(10,10,10,.55);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--ink);border:1px solid var(--line);border-radius:999px;
    width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;padding:0;
  }
  .overlay #fullscreen:active{background:rgba(255,77,46,.25);border-color:var(--hot);}

  .panel{
    background:var(--panel);border-top:1px solid var(--line);
    padding:12px 14px 14px;
    max-height:48vh;overflow:auto;
    -webkit-overflow-scrolling:touch;
  }
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
  .row:last-child{margin-bottom:0;}

  label.lbl{font-size:10px;letter-spacing:.18em;color:var(--mute);text-transform:uppercase;
    min-width:62px;}

  input[type=text], textarea#text{
    flex:1;min-width:0;background:#000;color:var(--ink);
    border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-family:inherit;font-size:14px;letter-spacing:.02em;
    outline:none;resize:none;line-height:1.25;
    max-height:90px;
  }
  input[type=text]:focus, textarea#text:focus{border-color:#3a3a3a;}

  .tabs{
    display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--line);
  }
  .tabs button{
    flex:1;background:transparent;color:var(--mute);border:0;
    padding:8px 0 10px;font:inherit;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tabs button.active{color:var(--ink);border-bottom-color:var(--hot);}
  .tab-page{display:none;}
  .tab-page.active{display:block;}

  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
  .toggle{
    background:#000;color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:14px 14px;text-align:left;cursor:pointer;
    display:flex;flex-direction:column;gap:4px;align-items:flex-start;
    font:inherit;position:relative;
  }
  .toggle .dotmark{
    position:absolute;top:12px;right:12px;width:10px;height:10px;border-radius:50%;
    border:1px solid var(--line);background:transparent;transition:all .15s;
  }
  .toggle.active{border-color:var(--hot);background:#1a0d09;}
  .toggle.active .dotmark{background:var(--hot);border-color:var(--hot);
    box-shadow:0 0 8px rgba(255,77,46,.6);}
  .toggle .lab{font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;}
  .toggle .hint{font-size:10px;color:var(--mute);letter-spacing:.04em;}

  .geo{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%;}
  .geo button{
    background:#000;color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:9px 4px;font:inherit;font-size:10px;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:border-color .15s,background .15s;
  }
  .geo button svg{width:22px;height:22px;opacity:.85;}
  .geo button.active{border-color:var(--hot);background:#1a0d09;}
  .geo button.active svg{opacity:1;}
  .geo button.rolled{background:#3a1d11;border-color:#ff8a6a;}

  .sliders{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;width:100%;}
  .slider{display:flex;flex-direction:column;gap:4px;}
  .slider .head{display:flex;justify-content:space-between;font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
  .slider .head b{color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums;}
  .slider .head b.tappable{cursor:pointer;user-select:none;padding:1px 6px;margin:-1px -6px;
    border-radius:4px;transition:background .15s;}
  .slider .head b.tappable:active{background:rgba(255,77,46,.2);color:var(--hot);}
  button.mini{
    background:transparent;color:var(--mute);border:1px solid var(--line);
    border-radius:4px;padding:1px 6px;font:inherit;font-size:9px;letter-spacing:.14em;
    text-transform:uppercase;cursor:pointer;margin-left:6px;vertical-align:1px;
  }
  button.mini.active{color:var(--hot);border-color:var(--hot);}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:18px;background:transparent;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:2px;background:var(--line);border-radius:2px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:16px;height:16px;border-radius:50%;background:var(--ink);margin-top:-7px;
    border:0;
  }
  input[type=range]::-moz-range-track{height:2px;background:var(--line);border-radius:2px;}
  input[type=range]::-moz-range-thumb{
    width:16px;height:16px;border-radius:50%;background:var(--ink);border:0;
  }

  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%;}
  .actions button{
    background:#000;color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:11px 4px;font:inherit;font-size:10px;
    letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
  }
  .actions button.primary{background:var(--hot);border-color:var(--hot);color:#0a0a0a;font-weight:700;}
  .actions button.rec.active{background:#fff;border-color:#fff;color:#000;}

  .toast{
    position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);
    background:#fff;color:#000;padding:9px 14px;border-radius:999px;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    opacity:0;transition:all .25s ease;pointer-events:none;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-height:680px){
    .panel{max-height:55vh;}
    header{padding:10px 16px 8px;}
  }
</style>
</head>
<body>

<header>
  <span class="dot"></span>
  <h1>Refraction Studio</h1>
  <span class="meta" id="fps">— fps</span>
</header>

<div class="stage">
  <canvas id="gl"></canvas>
  <div class="overlay">
    <span id="zoomReadout">1.00×</span>
    <button id="centre" title="Reset pan and zoom">Centre</button>
    <button id="fullscreen" title="Fullscreen" aria-label="Fullscreen">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 9 4 4 9 4"/>
        <polyline points="20 9 20 4 15 4"/>
        <polyline points="4 15 4 20 9 20"/>
        <polyline points="20 15 20 20 15 20"/>
      </svg>
    </button>
  </div>
</div>

<div class="panel">
  <div class="row">
    <textarea id="text" rows="1" maxlength="120" autocomplete="off" autocapitalize="characters" spellcheck="false">HENNO</textarea>
  </div>

  <div class="tabs">
    <button data-tab="lens" class="active">Lens</button>
    <button data-tab="look">Look</button>
  </div>

  <div class="tab-page active" data-page="lens">
    <div class="row">
      <div class="geo" id="geo">
        <button data-g="0" class="active" title="Random distortion pattern">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M3 9 Q7 4 12 9 T21 11" stroke-linecap="round"/>
            <path d="M3 14 Q8 19 13 14 T22 16" stroke-linecap="round"/>
            <circle cx="6" cy="6" r="0.8" fill="currentColor"/>
            <circle cx="18" cy="19" r="0.8" fill="currentColor"/>
          </svg>
          Random
        </button>
        <button data-g="1" title="Vertical stripes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="4" y1="3" x2="4" y2="21"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <line x1="14" y1="3" x2="14" y2="21"/>
            <line x1="19" y1="3" x2="19" y2="21"/>
          </svg>
          Stripes
        </button>
        <button data-g="2" title="Wavy glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M2 7 Q6 3 10 7 T18 7 T22 7"/>
            <path d="M2 12 Q6 8 10 12 T18 12 T22 12"/>
            <path d="M2 17 Q6 13 10 17 T18 17 T22 17"/>
          </svg>
          Wavy
        </button>
        <button data-g="3" title="Fluted glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M4 21 L7 3 L10 21 Z"/>
            <path d="M10 21 L13 3 L16 21 Z"/>
            <path d="M16 21 L19 3 L22 21 Z"/>
          </svg>
          Fluted
        </button>
      </div>
    </div>

    <div class="row">
      <div class="sliders">
        <div class="slider">
          <div class="head"><span>Density</span><b id="vDensity">8</b></div>
          <input type="range" id="density" min="2" max="40" step="1" value="8">
        </div>
        <div class="slider">
          <div class="head"><span>Refract</span><b id="vIor">0.22</b></div>
          <input type="range" id="ior" min="0" max="100" step="1" value="22">
        </div>
        <div class="slider">
          <div class="head"><span>Speed</span><b id="vSpeed">0.40</b></div>
          <input type="range" id="speed" min="0" max="200" step="1" value="40">
        </div>
        <div class="slider">
          <div class="head"><span>Chroma</span><b id="vChroma">0.10</b></div>
          <input type="range" id="chroma" min="0" max="100" step="1" value="10">
        </div>
        <div class="slider">
          <div class="head">
            <span>Rotate <button id="autoRot" class="mini">AUTO</button></span>
            <b id="vRotate" class="tappable">0°</b>
          </div>
          <input type="range" id="rotate" min="0" max="360" step="1" value="0">
        </div>
      </div>
    </div>
  </div>

  <div class="tab-page" data-page="look">
    <div class="row">
      <div class="toggles">
        <button class="toggle" data-fx="grain">
          <span class="dotmark"></span>
          <span class="lab">Grain</span>
          <span class="hint">Sharp monochrome film grain</span>
        </button>
        <button class="toggle" data-fx="glow">
          <span class="dotmark"></span>
          <span class="lab">Glow</span>
          <span class="hint">Soft halo around letterforms</span>
        </button>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="actions">
      <button id="snap">Snapshot PNG</button>
      <button id="rec" class="rec">Record WEBM</button>
      <button id="invert" class="primary">Invert</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- WebGL setup ---------- */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', {preserveDrawingBuffer:true, antialias:true, premultipliedAlpha:false});
if(!gl){ document.body.innerHTML = '<p style="padding:24px">WebGL not supported on this device.</p>'; throw 0; }

const VERT = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos*0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

/*  Refraction model
    ----------------
    For each fragment we build a "surface normal" N(uv,t) representing the
    glass shape sitting on top of the text. We then sample the text texture
    at uv + N.xy * ior. Chromatic aberration shifts R/B channels with slightly
    different ior strengths.
*/
const FRAG = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex;
uniform vec2  u_res;
uniform float u_time;
uniform float u_density;
uniform float u_ior;
uniform float u_chroma;
uniform float u_invert;
uniform float u_rotate;
uniform float u_zoom;
uniform vec2  u_pan;
uniform float u_grain;
uniform float u_glow;
uniform vec2  u_texRegion;
uniform float u_seed;
uniform int   u_geo;

const float PI = 3.14159265;

/* hash & noise for organic blobs */
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash(i);
  float b = hash(i + vec2(1.0,0.0));
  float c = hash(i + vec2(0.0,1.0));
  float d = hash(i + vec2(1.0,1.0));
  vec2 u = f*f*(3.0-2.0*f);
  return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<4;i++){ v += a*noise(p); p*=2.02; a*=0.5; }
  return v;
}

/* Each geometry returns a 2D "normal" (xy slope of the implicit surface). */
vec2 geoNormal(vec2 uv, float t){
  /* aspect-correct working space */
  vec2 p = uv;
  p.x *= u_res.x / u_res.y;

  /* rotate the geometry around image center */
  float c = cos(u_rotate), s = sin(u_rotate);
  mat2 R  = mat2(c, -s, s,  c);
  mat2 Ri = mat2(c,  s, -s, c);
  p = R * p;

  if(u_geo == 0){
    /* RANDOM PATTERN — picks one of several mathematical/geometric
       generators based on the seed. Each tap of Random re-rolls and lands
       on a new algorithm: voronoi, ripples, lens grid, spiral, moire... */
    int variant = int(mod(u_seed, 8.0));
    /* a second seed-derived value for per-variant parameter variation */
    float v = fract(u_seed * 0.61803);   // 0..1
    float s = u_density * 0.5;
    vec2 q = p * s;

    if(variant == 0){
      /* VORONOI — cracked/hammered glass. Normal points toward the
         nearest random feature point. */
      vec2 ip = floor(q), fp = fract(q);
      vec2 best = vec2(0.0);
      float bestD = 8.0;
      for(int j=-1; j<=1; j++){
        for(int i=-1; i<=1; i++){
          vec2 g = vec2(float(i), float(j));
          vec2 jitter = vec2(hash(ip + g + u_seed),
                             hash(ip + g + u_seed + 13.7));
          vec2 diff = g + jitter - fp;
          float d = dot(diff, diff);
          if(d < bestD){ bestD = d; best = diff; }
        }
      }
      float len = length(best);
      vec2 n = (len > 0.001) ? best / len : vec2(0.0);
      return Ri * (-n * smoothstep(0.0, 0.6, len) * 1.3);
    }
    else if(variant == 1){
      /* CONCENTRIC RIPPLES — one droplet in the surface */
      vec2 c = vec2((v - 0.5) * 1.5, (fract(u_seed * 0.37) - 0.5) * 1.0);
      vec2 r = q * 0.4 - c;
      float d = length(r);
      vec2 dir = (d > 0.001) ? r / d : vec2(0.0);
      return Ri * (dir * cos(d * 3.0 - t * 0.5) * 1.2);
    }
    else if(variant == 2){
      /* MULTI-DROPLET — three ripple centers summed */
      vec2 grad = vec2(0.0);
      for(int i=0; i<3; i++){
        float fi = float(i);
        vec2 c = vec2(hash(vec2(u_seed + fi, 7.1)) - 0.5,
                      hash(vec2(u_seed + fi, 13.3)) - 0.5) * 3.0;
        vec2 r = q * 0.35 - c;
        float d = length(r);
        vec2 dir = (d > 0.001) ? r / d : vec2(0.0);
        grad += dir * cos(d * 2.5 - t * 0.4 - fi * 1.7);
      }
      return Ri * (grad * 0.5);
    }
    else if(variant == 3){
      /* HEX LENS LATTICE — grid of smooth lens domes on a hex packing */
      vec2 hexR = vec2(1.0, 1.7320508);
      vec2 a = mod(q, hexR) - hexR * 0.5;
      vec2 b = mod(q + hexR * 0.5, hexR) - hexR * 0.5;
      vec2 cell = (dot(a, a) < dot(b, b)) ? a : b;
      float d = length(cell);
      vec2 n = (d > 0.001) ? cell / d : vec2(0.0);
      /* smooth lens profile: zero at center, peaks mid-cell, falls at edge */
      float profile = sin(d * 3.6);
      return Ri * (n * profile * 1.1);
    }
    else if(variant == 4){
      /* CROSSED STRIPES (moire) — two sets at different angles, summed.
         Normal = -gradient of summed height field. */
      float a1 = v * 3.14159;
      float a2 = a1 + 0.7 + fract(u_seed * 0.91) * 1.2;
      vec2 d1 = vec2(cos(a1), sin(a1));
      vec2 d2 = vec2(cos(a2), sin(a2));
      float k = u_density * 0.8;
      vec2 g1 = -d1 * cos(dot(p, d1) * k + t * 0.2) * k;
      vec2 g2 = -d2 * cos(dot(p, d2) * k - t * 0.15) * k;
      return Ri * ((g1 + g2) * 0.04);
    }
    else if(variant == 5){
      /* SPIRAL — concentric rings with angular phase */
      float r = length(q) * 0.5;
      float ang = atan(q.y, q.x);
      float arms = floor(v * 5.0) + 2.0;
      float phase = r * 2.5 + ang * arms - t * 0.4;
      /* radial + tangential components of the gradient */
      vec2 rdir = (length(q) > 0.001) ? q / length(q) : vec2(1.0, 0.0);
      vec2 tdir = vec2(-rdir.y, rdir.x);
      float ch = cos(phase);
      return Ri * ((rdir * ch * 2.5 + tdir * ch * arms * 1.2) * 0.18);
    }
    else if(variant == 6){
      /* RADIAL SPOKES — angular wedges like a star burst */
      float ang = atan(q.y, q.x);
      float spokes = floor(v * 10.0) + 6.0;
      float r = length(q);
      /* gradient: angular component dominates */
      vec2 tdir = (r > 0.001) ? vec2(-q.y, q.x) / r : vec2(0.0);
      return Ri * (tdir * cos(ang * spokes + t * 0.3) * spokes * 0.12);
    }
    else {
      /* TRIANGULAR LATTICE — equilateral triangle cells */
      vec2 tri = q * vec2(1.0, 0.866);
      tri.x += mod(floor(tri.y), 2.0) * 0.5;
      vec2 fp = fract(tri) - 0.5;
      float d = length(fp);
      vec2 n = (d > 0.001) ? fp / d : vec2(0.0);
      return Ri * (n * smoothstep(0.0, 0.5, d) * 1.3);
    }
  }
  else if(u_geo == 1){
    /* VERTICAL STRIPES — sawtooth in X, each stripe is a half-cylinder */
    float x = (p.x + t*0.05) * u_density;
    float fx = fract(x) - 0.5;          // -0.5..0.5 across each stripe
    /* slope of half-cylinder cross section: derivative of sqrt(1-(2fx)^2) ~ -fx/sqrt */
    float k = 1.0 - 4.0*fx*fx;
    float n = (k > 0.001) ? -2.0*fx / sqrt(k) : 0.0;
    n = clamp(n, -4.0, 4.0);
    return Ri * vec2(n, 0.0);
  }
  else if(u_geo == 2){
    /* WAVY GLASS — dense horizontal ribs like architectural ribbed glass.
       Each rib is a small smooth bell-shaped bump running horizontally.
       Identical profile to fluted but oriented across Y and packed tighter. */
    float s = u_density * 1.8;
    float y = p.y * s + t * 0.05;
    float fy = fract(y) - 0.5;                  // -0.5..0.5 across each rib
    float n = sin(fy * PI) * 1.4;
    return Ri * vec2(0.0, n);
  }
  else {
    /* FLUTED GLASS — vertical wedge prisms (architectural reeded glass).
       Each flute is a smooth concave column with a strong horizontal
       refraction toward its center axis. */
    float s = u_density;
    float x = p.x*s + t*0.05;
    float fx = fract(x) - 0.5;                  // -0.5..0.5 across each flute
    /* smooth bell curve cross-section: height ~ cos(pi*fx),
       derivative gives a clean horizontal normal that peaks mid-flute */
    float n = sin(fx * PI) * 1.6;
    /* gentle vertical waver so flutes feel like blown glass, not extrusions */
    n *= 1.0 + 0.12 * sin(p.y * s * 0.3 + t * 0.4);
    return Ri * vec2(n, 0.0);
  }
}

vec3 sampleTex(vec2 uv){
  /* apply view transform (zoom around image center + pan) */
  vec2 tuv = (uv - 0.5) / u_zoom + 0.5 + u_pan;
  /* remap 0..1 onto the active centered region inside the POT texture */
  tuv = (tuv - 0.5) * u_texRegion + 0.5;
  /* clamp to avoid wrap artifacts at edges */
  tuv = clamp(tuv, vec2(0.001), vec2(0.999));
  return texture2D(u_tex, tuv).rgb;
}

/* Mip-biased sampler for the glow — reads from a coarser mip level so each
   tap is already pre-blurred. Combined with the spiral, this makes the
   halo genuinely soft instead of structured. */
vec3 sampleTexSoft(vec2 uv, float bias){
  vec2 tuv = (uv - 0.5) / u_zoom + 0.5 + u_pan;
  tuv = (tuv - 0.5) * u_texRegion + 0.5;
  tuv = clamp(tuv, vec2(0.001), vec2(0.999));
  return texture2D(u_tex, tuv, bias).rgb;
}

/* simple pseudo-random for grain — animates with time for film flicker */
float rand(vec2 p){
  return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
}

void main(){
  vec2 uv = v_uv;
  vec2 N = geoNormal(uv, u_time);

  /* convert "world" normal back to uv space (undo aspect) */
  N.x *= u_res.y / u_res.x;

  float ior = u_ior;
  float ca  = u_chroma * 0.5;

  /* chromatic refraction: R/G/B sample with slightly different strengths */
  vec3 col;
  col.r = sampleTex(uv + N * (ior * (1.0 + ca))).r;
  col.g = sampleTex(uv + N * (ior)).g;
  col.b = sampleTex(uv + N * (ior * (1.0 - ca))).b;

  /* GLOW — 24-tap multi-ring sample of the SOURCE text creates a soft halo
     around the actual letterforms. Three rings with gaussian-style falloff
     weights for a creamy bloom rather than a hard ring. */
  if(u_glow > 0.5){
    vec3 halo = vec3(0.0);
    float wsum = 0.0;
    /* ring 1: tight, full weight */
    for(int i=0; i<8; i++){
      float a = 6.2831853 * float(i) / 8.0;
      vec2 off = vec2(cos(a), sin(a)) * 0.010;
      halo += sampleTex(uv + N * ior + off) * 1.0;
      wsum += 1.0;
    }
    /* ring 2: medium, half weight */
    for(int i=0; i<8; i++){
      float a = 6.2831853 * float(i) / 8.0 + 0.39;  // offset so rings don't align
      vec2 off = vec2(cos(a), sin(a)) * 0.025;
      halo += sampleTex(uv + N * ior + off) * 0.55;
      wsum += 0.55;
    }
    /* ring 3: wide, light weight for soft outer falloff */
    for(int i=0; i<8; i++){
      float a = 6.2831853 * float(i) / 8.0 + 0.78;
      vec2 off = vec2(cos(a), sin(a)) * 0.055;
      halo += sampleTex(uv + N * ior + off) * 0.22;
      wsum += 0.22;
    }
    halo /= wsum;
    /* additive blend at full strength — falloff comes from the weights above */
    col += halo * 1.1;
  }

  /* invert toggle (black text on white bg vs white on black) */
  col = mix(col, 1.0 - col, u_invert);

  /* GRAIN — true per-frame regeneration. The time term is mixed into the
     hash dot-product so every pixel gets a fully independent value that
     changes every frame, not a static field that shifts. */
  if(u_grain > 0.5){
    vec2 p = floor(gl_FragCoord.xy);
    /* salt each pixel with a per-frame value so the entire noise field
       rerolls every frame instead of translating */
    float t = fract(u_time * 7.13);
    float n = fract(sin(dot(p, vec2(12.9898, 78.233)) + t * 91.7) * 43758.5453);
    col += vec3(n - 0.5) * 0.45;
  }

  gl_FragColor = vec4(col, 1.0);
}`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s)); throw new Error('shader');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {
  tex:      gl.getUniformLocation(prog,'u_tex'),
  res:      gl.getUniformLocation(prog,'u_res'),
  time:     gl.getUniformLocation(prog,'u_time'),
  density:  gl.getUniformLocation(prog,'u_density'),
  ior:      gl.getUniformLocation(prog,'u_ior'),
  chroma:   gl.getUniformLocation(prog,'u_chroma'),
  invert:   gl.getUniformLocation(prog,'u_invert'),
  rotate:   gl.getUniformLocation(prog,'u_rotate'),
  zoom:     gl.getUniformLocation(prog,'u_zoom'),
  pan:      gl.getUniformLocation(prog,'u_pan'),
  grain:    gl.getUniformLocation(prog,'u_grain'),
  glow:     gl.getUniformLocation(prog,'u_glow'),
  texRegion:gl.getUniformLocation(prog,'u_texRegion'),
  seed:     gl.getUniformLocation(prog,'u_seed'),
  geo:      gl.getUniformLocation(prog,'u_geo'),
};

/* ---------- Text texture (offscreen canvas) ---------- */
const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

const off = document.createElement('canvas');
const offCtx = off.getContext('2d');
const texRegion = [1, 1];   // active sub-region of POT texture (w,h fractions)

function renderText(str){
  /* render text at a fixed POWER-OF-TWO resolution so we can generate
     mipmaps. The aspect of the visible canvas is handled by the shader's
     view transform; here we draw the text into a centered region of the
     square texture that matches the canvas aspect. */
  const aspect = (canvas.width || 1) / (canvas.height || 1);
  const TEX = 2048;                            // POT for mipmaps
  off.width = TEX; off.height = TEX;
  offCtx.fillStyle = '#000';
  offCtx.fillRect(0,0,TEX,TEX);
  offCtx.fillStyle = '#fff';
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';

  /* compute the active region inside the square: same aspect as the live
     canvas, centered. Text gets fitted into that region. */
  let regionW, regionH;
  if(aspect >= 1){
    regionW = TEX; regionH = TEX / aspect;
  } else {
    regionH = TEX; regionW = TEX * aspect;
  }
  /* expose region fractions to the shader so UV 0..1 maps to the active area */
  texRegion[0] = regionW / TEX;
  texRegion[1] = regionH / TEX;
  const w = regionW, h = regionH;
  const offsetX = (TEX - regionW) / 2;
  const offsetY = (TEX - regionH) / 2;

  /* split into lines, drop trailing empties, fallback to single space */
  let lines = (str || '').split('\n');
  while(lines.length && lines[lines.length-1].trim() === '') lines.pop();
  if(!lines.length) lines = [' '];

  const fontFor = s => `900 ${s}px "Helvetica Neue", Helvetica, Arial, sans-serif`;

  /* find the largest font size where every line fits horizontally AND the
     stacked block fits vertically. Vertical line spacing = 1.05 × fontSize. */
  const targetW = w * 0.88;
  const targetH = h * 0.88;
  const lineGap = 1.05;
  let size = Math.floor(h * 0.7 / Math.max(1, lines.length));
  offCtx.font = fontFor(size);
  while(size > 20){
    offCtx.font = fontFor(size);
    let widest = 0;
    for(const ln of lines){
      const m = offCtx.measureText(ln || ' ').width;
      if(m > widest) widest = m;
    }
    const totalH = size * lineGap * lines.length;
    if(widest <= targetW && totalH <= targetH) break;
    size -= 8;
  }
  offCtx.font = fontFor(size);

  /* draw each line, centered in the region */
  const totalH = size * lineGap * lines.length;
  const startY = offsetY + h/2 - totalH/2 + size * lineGap / 2;
  for(let i=0; i<lines.length; i++){
    offCtx.fillText(lines[i] || ' ', offsetX + w/2, startY + i * size * lineGap);
  }

  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, off);
  /* TEX is power-of-two, so mipmaps work. Trilinear filtering gives smooth
     zoom AND lets the glow shader sample blurred mip levels via lod bias. */
  gl.generateMipmap(gl.TEXTURE_2D);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
}

/* ---------- State + UI ---------- */

      /* increment by 1 to move to next variant, plus 8 to ensure the
         fract() that drives the per-variant param also shifts */

/* ---------- Pan + Zoom ---------- */
/* Pan is stored in normalized UV space (1.0 = full image width).
   Zoom 1 = fit, higher = closer in. Clamped to [0.3, 50]. */
const zoomReadout = $('zoomReadout');
function updateZoomReadout(){
  zoomReadout.textContent = state.zoom.toFixed(2) + '×';
}
function clampPan(){
  /* don't let user pan so far the text leaves the viewport completely.
     Visible UV half-extent at current zoom is 0.5/zoom; allow panning until
     half the text is offscreen on either side. */
  const limit = Math.max(0, 0.5 - 0.5/state.zoom) + 0.2;
  state.panX = Math.max(-limit, Math.min(limit, state.panX));
  state.panY = Math.max(-limit, Math.min(limit, state.panY));
}
function setZoom(newZoom, anchorUv){
  newZoom = Math.max(0.3, Math.min(50, newZoom));
  if(anchorUv){
    /* keep the point under the user's fingers/cursor stationary in world space */
    const oldZ = state.zoom;
    /* worldUv = (uv - 0.5)/zoom + 0.5 + pan, hold worldUv constant for anchorUv */
    state.panX += (anchorUv.x - 0.5) * (1/oldZ - 1/newZoom);
    state.panY += (anchorUv.y - 0.5) * (1/oldZ - 1/newZoom);
  }
  state.zoom = newZoom;
  clampPan();
  updateZoomReadout();
}
function centreView(){
  state.zoom = 1; state.panX = 0; state.panY = 0;
  updateZoomReadout();
}
$('centre').addEventListener('click', centreView);
updateZoomReadout();

/* click zoom readout to cycle through preset zooms: 1× → 2× → 5× → 1× ... */
zoomReadout.addEventListener('click', () => {

  /* find current preset (with tolerance for floats); pick the next one */
  let idx = presets.findIndex(p => Math.abs(state.zoom - p) < 0.01);
  const next = presets[(idx + 1 + presets.length) % presets.length];
  /* anchor at image center for centred zoom */
  setZoom(next, {x:0.5, y:0.5});
});

/* Mouse wheel zoom (desktop) */
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const ax = (e.clientX - r.left) / r.width;
  const ay = 1 - (e.clientY - r.top) / r.height;  // GL y is flipped (UV y up)
  const factor = Math.exp(-e.deltaY * 0.0015);
  setZoom(state.zoom * factor, {x:ax, y:ay});
}, {passive:false});

/* Pointer-based pan + pinch zoom (touch + mouse + pen unified) */
const pointers = new Map();
let pinchStart = null; // {dist, zoom, midUv}
let lastTap = 0;

function uvFromEvent(e){
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width,
    y: 1 - (e.clientY - r.top) / r.height,
  };
}

canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  /* double-tap to recentre (touch primarily, also dbl-click) */
  const now = performance.now();
  if(pointers.size === 1 && now - lastTap < 300){
    centreView();
    lastTap = 0;
  } else {
    lastTap = now;
  }

  if(pointers.size === 2){
    const pts = [...pointers.values()];
    const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    const dist = Math.hypot(dx, dy) || 1;
    /* midpoint in UV */
    const r = canvas.getBoundingClientRect();
    const mx = (pts[0].x + pts[1].x)/2;
    const my = (pts[0].y + pts[1].y)/2;
    pinchStart = {
      dist,
      zoom: state.zoom,
      midUv: { x:(mx - r.left)/r.width, y:1 - (my - r.top)/r.height }
    };
  }
});

canvas.addEventListener('pointermove', e => {
  if(!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(pointers.size === 1){
    /* pan: convert pixel delta to UV delta. Drag moves image (so subtract). */
    const r = canvas.getBoundingClientRect();
    state.panX -= (dx / r.width) / state.zoom;
    state.panY += (dy / r.height) / state.zoom;
    clampPan();
  } else if(pointers.size === 2 && pinchStart){
    const pts = [...pointers.values()];
    const ddx = pts[0].x - pts[1].x, ddy = pts[0].y - pts[1].y;
    const dist = Math.hypot(ddx, ddy) || 1;
    const targetZoom = pinchStart.zoom * (dist / pinchStart.dist);
    setZoom(targetZoom, pinchStart.midUv);
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  if(pointers.size < 2) pinchStart = null;
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
canvas.addEventListener('pointerleave', endPointer);

/* prevent iOS context menu / selection on long-press */

/* ---------- Resize ---------- */
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const stage = canvas.parentElement.getBoundingClientRect();
  const w = Math.max(1, Math.floor(stage.width * dpr));
  const h = Math.max(1, Math.floor(stage.height * dpr));
  if(canvas.width !== w || canvas.height !== h){
    canvas.width = w; canvas.height = h;
    gl.viewport(0,0,w,h);
    renderText(state.text);
  }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

/* ---------- Render loop ---------- */
let t0 = performance.now();
let tAccum = 0;
let frames = 0, lastFpsT = t0;
const fpsEl = $('fps');

function frame(now){
  const dt = (now - t0) / 1000; t0 = now;
  tAccum += dt * state.speed * 6.0; // scale so default speed feels right

  if(state.autoRotate){
    state.rotate += dt * 0.4; // ~23°/sec
    const deg = ((state.rotate * 180 / Math.PI) % 360 + 360) % 360;
    rotEl.value = deg.toFixed(0);
    rotOut.textContent = Math.round(deg) + '°';
  }

  resize();

  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(U.tex, 0);
  gl.uniform2f(U.res, canvas.width, canvas.height);
  gl.uniform1f(U.time, tAccum);
  gl.uniform1f(U.density, state.density);
  gl.uniform1f(U.ior, state.ior * 0.08);   // map slider to visually pleasant range
  gl.uniform1f(U.chroma, state.chroma);
  gl.uniform1f(U.invert, state.invert);
  gl.uniform1f(U.rotate, state.rotate);
  gl.uniform1f(U.zoom, state.zoom);
  gl.uniform2f(U.pan, state.panX, state.panY);
  gl.uniform1f(U.grain, state.grain);
  gl.uniform1f(U.glow, state.glow);
  gl.uniform2f(U.texRegion, texRegion[0], texRegion[1]);
  gl.uniform1f(U.seed, state.seed);
  gl.uniform1i(U.geo, state.geo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  frames++;
  if(now - lastFpsT > 500){
    fpsEl.textContent = Math.round(frames * 1000 / (now - lastFpsT)) + ' fps';
    frames = 0; lastFpsT = now;
  }
  requestAnimationFrame(frame);
}

let recorder = null, recChunks = [];
$('rec').addEventListener('click', e => {
  const btn = e.currentTarget;
  if(recorder && recorder.state === 'recording'){
    recorder.stop();
    return;
  }
  if(!canvas.captureStream){
    toast('Recording unsupported here'); return;
  }
  const stream = canvas.captureStream(60);
  let mime = 'video/webm;codecs=vp9';
  if(!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  if(!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
  if(!MediaRecorder.isTypeSupported(mime)){
    toast('WEBM unsupported (try Chrome)'); return;
  }
  recChunks = [];
  recorder = new MediaRecorder(stream, {mimeType: mime, videoBitsPerSecond: 8_000_000});
  recorder.ondataavailable = ev => { if(ev.data.size) recChunks.push(ev.data); };
  recorder.onstop = () => {
    const blob = new Blob(recChunks, {type:'video/webm'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `refraction_${Date.now()}.webm`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
    btn.classList.remove('active');
    btn.textContent = 'Record WEBM';
    toast('WEBM saved');
  };
  recorder.start();
  btn.classList.add('active');
  btn.textContent = 'Stop ●';
  toast('Recording…');
});

/* ---------- Boot ---------- */
resize();
renderText(state.text);
requestAnimationFrame(frame);
</script>
</body>
</html>
